# Deploy
#
# CI workflow that ships Fisqua to Cloudflare when new code lands on
# the `main` branch. The job runs in two stages: a test stage that
# installs dependencies, runs Vitest and the TypeScript type-check,
# and a deploy stage that runs the React Router production build,
# applies any pending D1 migrations to the `fisqua-db` database, and
# uploads the Worker to Cloudflare.
#
# Concurrency is scoped to a single in-flight deploy so simultaneous
# pushes queue rather than clobber each other. Required repository
# secrets: CLOUDFLARE_WORKERS_TOKEN (API token with Workers Edit +
# D1 Edit), CLOUDFLARE_ACCOUNT_ID.
#
# Version: v0.3.1

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest --run
      - run: npm run typecheck

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            wrangler d1 migrations apply fisqua-db --remote
          command: deploy
